<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App Frontend</title>
    <!-- Script Utama Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #222222);
            --btn-color: var(--tg-theme-button-color, #3390ec);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }
        .card {
            background: rgba(125, 125, 125, 0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 350px;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--btn-color);
            color: var(--btn-text);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            margin: 0 auto 15px;
        }
        button {
            background-color: var(--btn-color);
            color: var(--btn-text);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="avatar" id="avatar">?</div>
        <h2>Halo, <span id="username">Guest</span>!</h2>
        <p>Selamat datang di Mini App Frontend saya yang dihosting di GitHub Pages.</p>
        
        <!-- Tombol Utama Telegram (Main Button) akan muncul di bagian bawah layar Telegram -->
        <button id="alert-btn">Kirim Notifikasi</button>
    </div>

    <script>
        // Inisialisasi Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Membuat web app terbuka penuh (full screen)

        // Mengambil data user dari Telegram
        const user = tg.initDataUnsafe?.user;

        if (user) {
            document.getElementById('username').innerText = user.first_name;
            // Ambil huruf pertama nama untuk avatar
            document.getElementById('avatar').innerText = user.first_name.charAt(0).toUpperCase();
        }

        // Event saat tombol di klik
        document.getElementById('alert-btn').addEventListener('click', () => {
            // Memunculkan pop-up bawaan Telegram
            tg.showAlert(`Halo ${user ? user.first_name : 'Teman'}! Ini adalah fitur bawaan Telegram WebApp.`);
        });
    </script>
</body>
</html>
