<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Mini App Multi-Tab</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #222222);
            --btn-color: var(--tg-theme-button-color, #3390ec);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
            --hint-color: var(--tg-theme-hint-color, #aaaaaa);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow: hidden;
        }
        .content-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin-bottom: 90px;
            overflow-y: auto;
        }
        .card {
            background: rgba(125, 125, 125, 0.1);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 350px;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--btn-color);
            color: var(--btn-text);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            margin: 0 auto 15px;
        }
        .clock {
            font-size: 36px;
            font-weight: bold;
            color: var(--btn-color);
            margin: 15px 0;
        }
        .info-box {
            text-align: left;
            background: rgba(0, 0, 0, 0.04);
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
        }
        button {
            background-color: var(--btn-color);
            color: var(--btn-text);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--bg-color);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
            border-top: 1px solid rgba(125, 125, 125, 0.2);
            z-index: 9999;
        }
        .nav-item {
            background: none;
            border: none;
            color: var(--hint-color);
            font-size: 12px;
            font-weight: normal;
            cursor: pointer;
            padding: 8px;
            margin: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }
        .nav-item .icon {
            font-size: 20px;
            margin-bottom: 2px;
            pointer-events: none;
        }
        .nav-item span {
            pointer-events: none;
        }
        .nav-item.active {
            color: var(--btn-color);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="content-container">
        
        <div id="tab-home" class="tab-content active">
            <div class="card">
                <div class="avatar" id="avatar">?</div>
                <h2>Halo, <span id="username">Guest</span>!</h2>
                <p>Selamat datang di Mini App utama yang terhubung dengan GitHub Pages.</p>
                <button id="alert-btn">Kirim Notifikasi</button>
            </div>
        </div>

        <div id="tab-features" class="tab-content">
            <div class="card">
                <h3>🕒 Jam</h3>
                <div class="clock" id="jam-digital">00:00:00</div>
                <div style="font-weight: 500;" id="tanggal-kalender">Memuat tanggal...</div>
            </div>
        </div>

        <div id="tab-profile" class="tab-content">
            <div class="card">
                <h3>👤 Akun Telegram</h3>
                <div class="info-box">
                    <p><strong>Nama:</strong> <span id="prof-name">-</span></p>
                    <p><strong>Username:</strong> @<span id="prof-user">-</span></p>
                    <p><strong>ID User:</strong> <span id="prof-id">-</span></p>
                </div>
            </div>
        </div>

    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="gantiTab('home', this)">
            <span class="icon">🏠</span>
            <span>Home</span>
        </button>
        <button class="nav-item" onclick="gantiTab('features', this)">
            <span class="icon">🕒</span>
            <span>Jam</span>
        </button>
        <button class="nav-item" onclick="gantiTab('profile', this)">
            <span class="icon">👤</span>
            <span>Info Profil</span>
        </button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
